services:
  app:
    container_name: go-api
    build:
      context: .
      dockerfile: Dockerfile
    image: go-api
    ports:
      - 8080:8080
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=myuser
      - DB_PASSWORD=secret
      - DB_NAME=greenlight
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - go-network

  postgres:
    image: docker.io/library/postgres:17
    environment:
      - POSTGRES_DB=greenlight
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=secret
    ports:
      - "5435:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - go-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "myuser", "-d", "greenlight"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  dbdata:

networks:
  go-network:
    driver: bridge